{% extends "app_page.html" %}

{% block page_content %}
<style>
.profile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
.profile-card { background: var(--panel); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 20px; }
.profile-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.08); }
.profile-avatar { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, var(--cyan), var(--violet)); display: flex; align-items: center; justify-content: center; font-size: 32px; }
.profile-info h2 { font-size: 18px; font-weight: 700; margin: 0; }
.profile-info p { font-size: 12px; color: var(--text-3); margin: 4px 0; }
.form-group { margin-bottom: 15px; }
.form-label { font-size: 12px; font-weight: 600; color: var(--text-1); margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: 0.05em; }
.form-input { width: 100%; padding: 10px 12px; background: rgba(0,212,255,0.05); border: 1px solid rgba(0,212,255,0.2); border-radius: 6px; color: white; font-size: 12px; }
.form-input:focus { outline: none; border-color: var(--cyan); background: rgba(0,212,255,0.1); }
.btn { padding: 10px 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 12px; }
.btn-primary { background: var(--cyan); color: var(--bg-void); }
.btn-primary:hover { background: rgba(0,212,255,0.8); }
.loading { color: var(--text-3); font-size: 12px; }
</style>

<div class="card">
  <h1 class="h1">Profile</h1>
  <p class="p">Manage your profile information</p>

  <div id="profile-content">
    <div class="loading">Loading profile...</div>
  </div>
</div>

<script>
async function loadProfile() {
  try {
    const res = await fetch('/api/profile');
    const data = await res.json();
    
    const html = `
      <div class="profile-grid">
        <div class="profile-card">
          <div class="profile-header">
            <div class="profile-avatar">${data.name.charAt(0).toUpperCase()}</div>
            <div class="profile-info">
              <h2>${data.name}</h2>
              <p>@${data.username}</p>
              <p>${data.account_type} Account</p>
            </div>
          </div>
          
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-input" id="name" value="${data.name}">
          </div>
          
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-input" id="email" value="${data.email}">
          </div>
          
          <div class="form-group">
            <label class="form-label">Account Type</label>
            <input type="text" class="form-input" value="${data.account_type}" disabled>
          </div>
          
          <button class="btn btn-primary" onclick="saveProfile()">Save Changes</button>
        </div>
        
        <div class="profile-card">
          <h3 style="font-family: var(--fh); font-size: 14px; font-weight: 700; margin-bottom: 16px;">📊 Portfolio Performance</h3>
          <div style="margin-bottom: 15px; padding: 12px; background: rgba(0,212,255,0.05); border-radius: 8px;">
            <div style="font-size: 11px; color: var(--text-3); margin-bottom: 4px;">YTD Return</div>
            <div style="font-size: 13px; font-weight: 600; color: var(--green);">+12.48%</div>
          </div>
          <div style="margin-bottom: 15px; padding: 12px; background: rgba(0,212,255,0.05); border-radius: 8px;">
            <div style="font-size: 11px; color: var(--text-3); margin-bottom: 4px;">Total Assets</div>
            <div style="font-size: 13px; font-weight: 600; color: var(--cyan);">\$185,420.50</div>
          </div>
          <div style="margin-bottom: 15px; padding: 12px; background: rgba(0,212,255,0.05); border-radius: 8px;">
            <div style="font-size: 11px; color: var(--text-3); margin-bottom: 4px;">Win Rate</div>
            <div style="font-size: 13px; font-weight: 600; color: var(--amber);">67.3%</div>
          </div>
          <div style="margin-bottom: 15px; padding: 12px; background: rgba(0,212,255,0.05); border-radius: 8px;">
            <div style="font-size: 11px; color: var(--text-3); margin-bottom: 4px;">Sharpe Ratio</div>
            <div style="font-size: 13px; font-weight: 600; color: var(--violet);">1.84</div>
          </div>
          <h3 style="font-family: var(--fh); font-size: 12px; font-weight: 700; margin-bottom: 12px; margin-top: 18px;">Account Details</h3>
          <div style="margin-bottom: 8px; padding: 8px; background: rgba(255,255,255,0.03); border-radius: 6px;">
            <div style="font-size: 10px; color: var(--text-3);">Member Since: ${new Date(data.joined).toLocaleDateString()}</div>
          </div>
          <div style="margin-bottom: 8px; padding: 8px; background: rgba(255,255,255,0.03); border-radius: 6px;">
            <div style="font-size: 10px; color: var(--text-3);">Last Login: ${new Date(data.last_login).toLocaleString()}</div>
          </div>
          <div style="padding: 8px; background: rgba(0,230,118,0.08); border-radius: 6px;">
            <div style="font-size: 10px; color: var(--green);">✓ Account Active</div>
          </div>
        </div>
      </div>
    `;
    
    document.getElementById('profile-content').innerHTML = html;
  } catch(e) {
    console.error('Failed to load profile:', e);
    document.getElementById('profile-content').innerHTML = '<div class="loading" style="color: var(--red);">Error loading profile</div>';
  }
}

function saveProfile() {
  const name = document.getElementById('name').value;
  const email = document.getElementById('email').value;
  
  fetch('/api/profile', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, email })
  }).then(r => r.json()).then(data => {
    alert('Profile updated successfully!');
  }).catch(e => alert('Error updating profile'));
}

document.addEventListener('DOMContentLoaded', loadProfile);
</script>
{% endblock %}
