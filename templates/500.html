{% extends "base.html" %}

{% block title %}500 - Server Error{% endblock %}

{% block content %}
<div class="error-page" style="display: flex; align-items: center; justify-content: center; min-height: 70vh;">
    <div class="text-center">
        <div style="font-size: 8rem; font-weight: 700; color: #dc3545; margin-bottom: 1rem;">
            500
        </div>
        <h1 class="display-4 fw-bold mb-3">Server Error</h1>
        <p class="lead text-muted mb-4">
            Something went wrong on our end. Please try again later or contact our support team.
        </p>
        <div class="mt-5">
            <a href="/" class="btn btn-primary btn-lg me-3">
                <i class="fas fa-home"></i> Go to Dashboard
            </a>
            <a href="/documentation" class="btn btn-secondary btn-lg">
                <i class="fas fa-book"></i> Documentation
            </a>
        </div>
    </div>
</div>
{% endblock %}
