{% extends "app_page.html" %}

{% block page_content %}
<style>
.settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
.settings-card { background: var(--panel); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 20px; }
.settings-title { font-family: var(--fh); font-size: 14px; font-weight: 700; margin-bottom: 16px; }
.setting-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
.setting-item:last-child { border-bottom: none; }
.setting-label { flex: 1; }
.setting-name { font-weight: 600; font-size: 12px; margin-bottom: 4px; }
.setting-desc { font-size: 11px; color: var(--text-3); }
.toggle { width: 40px; height: 24px; background: rgba(0,212,255,0.3); border-radius: 12px; cursor: pointer; position: relative; border: none; }
.toggle.active { background: var(--green); }
.toggle::after { content: ''; position: absolute; width: 20px; height: 20px; background: white; border-radius: 50%; top: 2px; left: 2px; transition: left 0.3s; }
.toggle.active::after { left: 18px; }
.form-group { margin-bottom: 15px; }
.form-label { font-size: 12px; font-weight: 600; color: var(--text-1); margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: 0.05em; }
.form-select { width: 100%; padding: 10px 12px; background: rgba(0,212,255,0.05); border: 1px solid rgba(0,212,255,0.2); border-radius: 6px; color: white; font-size: 12px; }
.form-select:focus { outline: none; border-color: var(--cyan); }
.btn { padding: 10px 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 12px; }
.btn-primary { background: var(--cyan); color: var(--bg-void); }
.btn-primary:hover { background: rgba(0,212,255,0.8); }
.loading { color: var(--text-3); font-size: 12px; }
</style>

<div class="card">
  <h1 class="h1">Settings</h1>
  <p class="p">Configure your preferences and application settings</p>

  <div id="settings-content">
    <div class="loading">Loading settings...</div>
  </div>
</div>

<script>
async function loadSettings() {
  try {
    const res = await fetch('/api/settings');
    const settings = await res.json();
    
    const html = `
      <div class="settings-grid">
        <div class="settings-card">
          <div class="settings-title">🎨 Display Settings</div>
          
          <div class="form-group">
            <label class="form-label">Theme</label>
            <select class="form-select" id="theme">
              <option value="dark" ${settings.theme === 'dark' ? 'selected' : ''}>Dark</option>
              <option value="light" ${settings.theme === 'light' ? 'selected' : ''}>Light</option>
            </select>
          </div>
          
          <div class="form-group">
            <label class="form-label">Default Timeframe</label>
            <select class="form-select" id="timeframe">
              <option value="30" ${settings.default_timeframe === '30' ? 'selected' : ''}>30 Days</option>
              <option value="252" ${settings.default_timeframe === '252' ? 'selected' : ''}>1 Year</option>
              <option value="504" ${settings.default_timeframe === '504' ? 'selected' : ''}>2 Years</option>
            </select>
          </div>
          
          <div class="form-group">
            <label class="form-label">Analysis Depth</label>
            <select class="form-select" id="depth">
              <option value="quick" ${settings.analysis_depth === 'quick' ? 'selected' : ''}>Quick</option>
              <option value="detailed" ${settings.analysis_depth === 'detailed' ? 'selected' : ''}>Detailed</option>
              <option value="expert" ${settings.analysis_depth === 'expert' ? 'selected' : ''}>Expert</option>
            </select>
          </div>
        </div>
        
        <div class="settings-card">
          <div class="settings-title">🔔 Notification Settings</div>
          
          <div class="setting-item">
            <div class="setting-label">
              <div class="setting-name">Email Notifications</div>
              <div class="setting-desc">Receive updates via email</div>
            </div>
            <button class="toggle ${settings.email_alerts ? 'active' : ''}" id="emailToggle" onclick="toggleSetting(this, 'email')"></button>
          </div>
          
          <div class="setting-item">
            <div class="setting-label">
              <div class="setting-name">Push Notifications</div>
              <div class="setting-desc">Receive browser notifications</div>
            </div>
            <button class="toggle ${settings.push_alerts ? 'active' : ''}" id="pushToggle" onclick="toggleSetting(this, 'push')"></button>
          </div>
          
          <div class="setting-item">
            <div class="setting-label">
              <div class="setting-name">All Notifications Enabled</div>
              <div class="setting-desc">Master control for all alerts</div>
            </div>
            <button class="toggle ${settings.notifications_enabled ? 'active' : ''}" id="allToggle" onclick="toggleSetting(this, 'all')"></button>
          </div>
          
          <div class="form-group" style="margin-top: 15px;">
            <label class="form-label">Refresh Interval (seconds)</label>
            <select class="form-select" id="refresh">
              <option value="5" ${settings.refresh_interval === 5 ? 'selected' : ''}>5 seconds</option>
              <option value="10" ${settings.refresh_interval === 10 ? 'selected' : ''}>10 seconds</option>
              <option value="30" ${settings.refresh_interval === 30 ? 'selected' : ''}>30 seconds</option>
              <option value="60" ${settings.refresh_interval === 60 ? 'selected' : ''}>1 minute</option>
            </select>
          </div>
        </div>
        
        <div class="settings-card">
          <div class="settings-title">⚡ Performance Settings</div>
          
          <div class="setting-item">
            <div class="setting-label">
              <div class="setting-name">Auto-Refresh Data</div>
              <div class="setting-desc">Update market data automatically</div>
            </div>
            <button class="toggle active" id="autoRefreshToggle" onclick="toggleSetting(this, 'autorefresh')"></button>
          </div>
          
          <div class="setting-item">
            <div class="setting-label">
              <div class="setting-name">Show Advanced Metrics</div>
              <div class="setting-desc">Display detailed analysis data</div>
            </div>
            <button class="toggle active" id="advancedToggle" onclick="toggleSetting(this, 'advanced')"></button>
          </div>
          
          <div class="setting-item">
            <div class="setting-label">
              <div class="setting-name">Real-time Quotes</div>
              <div class="setting-desc">Stream live market quotes</div>
            </div>
            <button class="toggle active" id="realtimeToggle" onclick="toggleSetting(this, 'realtime')"></button>
          </div>
        </div>
      </div>
      
      <div style="margin-top: 20px;">
        <button class="btn btn-primary" onclick="saveSettings()">Save All Settings</button>
      </div>
    `;
    
    document.getElementById('settings-content').innerHTML = html;
  } catch(e) {
    console.error('Failed to load settings:', e);
    document.getElementById('settings-content').innerHTML = '<div class="loading" style="color: var(--red);">Error loading settings</div>';
  }
}

function toggleSetting(el, type) {
  el.classList.toggle('active');
}

function saveSettings() {
  const settings = {
    theme: document.getElementById('theme').value,
    default_timeframe: document.getElementById('timeframe').value,
    analysis_depth: document.getElementById('depth').value,
    refresh_interval: parseInt(document.getElementById('refresh').value),
    email_alerts: document.getElementById('emailToggle').classList.contains('active'),
    push_alerts: document.getElementById('pushToggle').classList.contains('active'),
    notifications_enabled: document.getElementById('allToggle').classList.contains('active'),
    auto_refresh: document.getElementById('autoRefreshToggle').classList.contains('active'),
    advanced_metrics: document.getElementById('advancedToggle').classList.contains('active'),
    realtime_quotes: document.getElementById('realtimeToggle').classList.contains('active')
  };
  
  fetch('/api/settings', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(settings)
  }).then(r => r.json()).then(data => {
    alert('Settings saved successfully!');
  }).catch(e => alert('Error saving settings'));
}

document.addEventListener('DOMContentLoaded', loadSettings);
</script>
{% endblock %}
