{% extends "app_page.html" %}

{% block page_content %}
<style>
.reports-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
.report-card { background: var(--panel); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 18px; transition: all 0.3s; }
.report-card:hover { border-color: rgba(0,212,255,0.3); background: rgba(0,212,255,0.02); }
.report-head { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.report-icon { font-size: 22px; }
.report-title { font-family: var(--fh); font-size: 14px; font-weight: 700; }
.report-desc { font-size: 11px; color: var(--text-3); margin-bottom: 12px; }
.report-summary { font-size: 12px; color: var(--text-2); line-height: 1.55; background: rgba(0,212,255,0.04); border-left: 3px solid var(--cyan); padding: 10px 12px; border-radius: 6px; margin-bottom: 12px; }
.metric-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; font-size: 11px; margin-bottom: 12px; }
.metric-cell { background: rgba(255,255,255,0.03); border-radius: 6px; padding: 6px 8px; }
.metric-cell .k { color: var(--text-3); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; }
.metric-cell .v { font-weight: 600; font-family: var(--fm); }
.highlight-list { list-style: none; padding: 0; margin: 0 0 12px; font-size: 11px; }
.highlight-list li { padding: 4px 0; color: var(--text-2); }
.report-meta { display: flex; justify-content: space-between; align-items: center; font-size: 10px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px; }
.report-date { color: var(--text-3); }
.report-btns { display: flex; gap: 6px; }
.report-btn { padding: 6px 10px; background: rgba(0,212,255,0.15); color: var(--cyan); border: 1px solid var(--cyan); border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: 600; text-decoration: none; display: inline-block; }
.report-btn:hover { background: rgba(0,212,255,0.3); }
.report-btn.alt { background: rgba(139,92,246,0.15); color: var(--violet); border-color: var(--violet); }
.pos { color: var(--green); } .neg { color: var(--red); }
.loading { color: var(--text-3); font-size: 12px; }
</style>

<div class="card">
  <h1 class="h1">History &amp; Reports</h1>
  <p class="p">Dynamically generated reports computed from the live regime history &mdash; refreshed on every page load.</p>

  <div id="reports-container">
    <div class="loading">Loading reports&hellip;</div>
  </div>
</div>

<script>
function fmtDate(iso) {
  try { return new Date(iso).toLocaleString(); } catch (e) { return iso; }
}

function signedClass(v) { return v >= 0 ? 'pos' : 'neg'; }

async function loadReports() {
  try {
    const res = await fetch('/api/reports');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const reports = data.reports || [];

    if (reports.length === 0) {
      document.getElementById('reports-container').innerHTML =
        '<div class="loading">No reports available yet.</div>';
      return;
    }

    const html = `
      <div class="reports-grid">
        ${reports.map(r => `
          <div class="report-card">
            <div class="report-head">
              <div class="report-icon">${r.icon}</div>
              <div class="report-title">${r.title}</div>
            </div>
            <div class="report-desc">${r.description}</div>
            <div class="report-summary">${r.summary}</div>
            <div class="metric-grid">
              <div class="metric-cell"><div class="k">Window</div><div class="v">${r.actual_days} days</div></div>
              <div class="metric-cell"><div class="k">Dominant regime</div><div class="v">${r.metrics.dominant_regime}</div></div>
              <div class="metric-cell"><div class="k">Price change</div><div class="v ${signedClass(r.metrics.pct_change)}">${r.metrics.pct_change >= 0 ? '+' : ''}${r.metrics.pct_change}%</div></div>
              <div class="metric-cell"><div class="k">Max drawdown</div><div class="v neg">${r.metrics.max_drawdown_pct}%</div></div>
              <div class="metric-cell"><div class="k">Avg volatility</div><div class="v">${r.metrics.avg_volatility_pct}%</div></div>
              <div class="metric-cell"><div class="k">Regime switches</div><div class="v">${r.metrics.regime_switches}</div></div>
            </div>
            <ul class="highlight-list">
              ${(r.highlights || []).map(h => `<li>&bull; ${h}</li>`).join('')}
            </ul>
            <div class="report-meta">
              <span class="report-date">Generated: ${fmtDate(r.generated)}</span>
              <span class="report-btns">
                <a class="report-btn" href="/api/reports/${r.id}?format=html" target="_blank">Open HTML</a>
                <a class="report-btn alt" href="/api/reports/${r.id}?format=json" target="_blank">Raw JSON</a>
              </span>
            </div>
          </div>
        `).join('')}
      </div>
    `;
    document.getElementById('reports-container').innerHTML = html;
  } catch (e) {
    console.error('Failed to load reports:', e);
    document.getElementById('reports-container').innerHTML =
      '<div class="loading" style="color: var(--red);">Error loading reports: ' + e.message + '</div>';
  }
}

document.addEventListener('DOMContentLoaded', loadReports);
</script>
{% endblock %}
