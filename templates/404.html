{% extends "base.html" %}

{% block title %}404 - Page Not Found{% endblock %}

{% block content %}
<div class="error-page" style="display: flex; align-items: center; justify-content: center; min-height: 70vh;">
    <div class="text-center">
        <div style="font-size: 8rem; font-weight: 700; color: var(--primary-color); margin-bottom: 1rem;">
            404
        </div>
        <h1 class="display-4 fw-bold mb-3">Page Not Found</h1>
        <p class="lead text-muted mb-4">
            Sorry, the page you're looking for doesn't exist. It might have been moved or deleted.
        </p>
        <div class="mt-5">
            <a href="/" class="btn btn-primary btn-lg me-3">
                <i class="fas fa-home"></i> Go to Dashboard
            </a>
            <a href="/about" class="btn btn-secondary btn-lg">
                <i class="fas fa-info-circle"></i> About
            </a>
        </div>
    </div>
</div>
{% endblock %}
