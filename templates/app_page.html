<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page_title }} · MRDE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Antonio:wght@400;500;600;700&family=Figtree:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --bg: #040814;
      --panel: rgba(11,18,34,0.85);
      --panel2: rgba(11,18,34,0.55);
      --text-1: #e8f1ff;
      --text-2: #b8c7e6;
      --text-3: #7f94bd;
      --cyan: #00d4ff;
      --violet: #8b5cf6;
      --green: #00e676;
      --red: #ff3d57;
      --amber: #ffb300;
      --fm: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
      --fd: "Figtree", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      --fh: "Antonio", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      background: radial-gradient(1200px 800px at 20% 20%, rgba(0,212,255,0.10), transparent 55%),
                  radial-gradient(900px 700px at 80% 15%, rgba(139,92,246,0.10), transparent 55%),
                  var(--bg);
      color:var(--text-1);
      font-family:var(--fd);
    }
    a{color:inherit;text-decoration:none}
    .app{display:flex; height:100%;}
    .sidebar{
      width:260px;
      background: linear-gradient(180deg, rgba(5,13,30,0.95), rgba(8,15,28,0.85));
      border-right:1px solid rgba(0,212,255,0.08);
      padding:20px 14px;
      display:flex;
      flex-direction:column;
      gap:16px;
      box-shadow:inset -1px 0 rgba(0,212,255,0.05);
    }
    .sb-logo{display:flex; align-items:center; gap:10px; padding:8px 10px;}
    .sb-logo-mark{width:34px;height:34px;border-radius:10px;background:rgba(0,212,255,0.12);display:grid;place-items:center;font-family:var(--fh);letter-spacing:0.06em;}
    .sb-logo-text{font-family:var(--fh);letter-spacing:0.08em;}
    .sb-nav{display:flex;flex-direction:column; gap:10px;}
    .sb-section-label{font-family:var(--fm);font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-3);padding:10px 10px 4px;}
    .sb-item{
      display:flex;align-items:center;gap:10px;
      padding:11px 12px;
      border-radius:10px;
      background:transparent;
      border:1px solid transparent;
      color:var(--text-2);
      transition:all 0.3s ease;
      font-size:13px;
      font-weight:500;
    }
    .sb-item:hover{background:rgba(0,212,255,0.08); color:var(--text-1); border-color:rgba(0,212,255,0.12);}
    .sb-item.active{background:linear-gradient(135deg, rgba(0,212,255,0.12), rgba(0,212,255,0.06)); border-color:rgba(0,212,255,0.25); color:var(--cyan); box-shadow:inset 0 0 12px rgba(0,212,255,0.08);}
    .sb-item svg{width:18px;height:18px;opacity:0.9}
    .sb-bottom{margin-top:auto}
    .sb-user{display:flex;align-items:center;gap:10px;padding:10px;border-radius:12px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);}
    .sb-avatar{width:36px;height:36px;border-radius:12px;background:rgba(139,92,246,0.16);display:grid;place-items:center;font-family:var(--fh);letter-spacing:0.08em;}
    .sb-user-name{font-weight:700}
    .sb-user-plan{font-family:var(--fm);font-size:10px;color:var(--text-3)}

    .main{flex:1; display:flex; flex-direction:column;}
    .topbar{
      height:64px;
      display:flex; align-items:center; justify-content:space-between;
      padding:0 24px;
      border-bottom:1px solid rgba(0,212,255,0.08);
      background:linear-gradient(90deg, rgba(5,13,30,0.8), rgba(7,15,35,0.8));
      backdrop-filter: blur(20px);
      box-shadow:inset 0 1px 0 rgba(0,212,255,0.1);
    }
    .topbar-title{font-family:var(--fh); letter-spacing:0.08em; font-size:18px; font-weight:700;}
    .topbar-sub{font-family:var(--fm); font-size:10px; color:var(--text-3); letter-spacing:0.12em; margin-top:2px;}
    .tb-actions{display:flex; align-items:center; gap:10px;}
    .tb-btn{
      border:1px solid rgba(0,212,255,0.15);
      background:linear-gradient(135deg, rgba(0,212,255,0.06), rgba(0,212,255,0.02));
      color:var(--text-2);
      padding:10px 14px;
      border-radius:10px;
      font-family:var(--fm);
      font-size:11px;
      cursor:pointer;
      transition:all 0.3s ease;
      font-weight:600;
      letter-spacing:0.05em;
    }
    .tb-btn:hover{color:var(--cyan); border-color:rgba(0,212,255,0.35); background:linear-gradient(135deg, rgba(0,212,255,0.1), rgba(0,212,255,0.05)); box-shadow:0 0 15px rgba(0,212,255,0.2);}
    .content{padding:32px; max-height:calc(100vh - 64px); overflow-y:auto;}
    .content::-webkit-scrollbar{width:8px;}
    .content::-webkit-scrollbar-track{background:transparent;}
    .content::-webkit-scrollbar-thumb{background:rgba(0,212,255,0.2); border-radius:4px;}
    .content::-webkit-scrollbar-thumb:hover{background:rgba(0,212,255,0.35);}
    .card{
      max-width:980px;
      background:linear-gradient(135deg, rgba(15,32,64,0.8) 0%, rgba(11,18,34,0.9) 100%);
      border:1px solid rgba(0,212,255,0.1);
      border-radius:20px;
      padding:28px;
      box-shadow: 0 0 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.08);
      backdrop-filter:blur(20px);
    }
    .h1{font-family:var(--fh); font-size:36px; letter-spacing:0.08em; margin:0; background:linear-gradient(135deg, var(--cyan), var(--violet)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;}
    .p{margin:12px 0 0 0; color:var(--text-2); line-height:1.7; font-size:14px;}
    .pill-row{margin-top:18px; display:flex; flex-wrap:wrap; gap:10px;}
    .pill{padding:12px 14px;border-radius:8px;background:linear-gradient(135deg, rgba(0,212,255,0.08), rgba(139,92,246,0.08));border:1px solid rgba(0,212,255,0.15);font-family:var(--fm);font-size:11px;color:var(--text-2); transition:all 0.3s ease;}
    .pill strong{color:var(--cyan); font-weight:600;}
    .pill:hover{background:linear-gradient(135deg, rgba(0,212,255,0.12), rgba(139,92,246,0.12)); border-color:rgba(0,212,255,0.25);}

    /* Enhanced form styling */
    .form-group{margin-bottom:18px;}
    .form-label{font-size:12px; font-weight:700; color:var(--cyan); margin-bottom:8px; display:block; text-transform:uppercase; letter-spacing:0.1em;}
    .form-input, .form-select{width:100%; padding:12px 14px; background:rgba(0,212,255,0.05); border:1px solid rgba(0,212,255,0.15); border-radius:10px; color:var(--text-1); font-size:13px; font-family:var(--fd); transition:all 0.3s ease;}
    .form-input:focus, .form-select:focus{outline:none; border-color:var(--cyan); background:rgba(0,212,255,0.08); box-shadow:0 0 20px rgba(0,212,255,0.15);}
    .btn{padding:12px 18px; border:none; border-radius:10px; cursor:pointer; font-weight:700; font-size:12px; transition:all 0.3s ease; font-family:var(--fh); letter-spacing:0.05em;}
    .btn-primary{background:linear-gradient(135deg, var(--cyan), rgba(0,212,255,0.8)); color:var(--bg);}
    .btn-primary:hover{transform:translateY(-2px); box-shadow:0 10px 30px rgba(0,212,255,0.3);}

    /* Grid layouts */
    .grid-2{display:grid; grid-template-columns:1fr 1fr; gap:20px;}
    .grid-3{display:grid; grid-template-columns:repeat(3,1fr); gap:20px;}
    @media(max-width:1024px){.grid-2{grid-template-columns:1fr;} .grid-3{grid-template-columns:1fr 1fr;}}

    /* Stats boxes */
    .stat-box{padding:18px; background:linear-gradient(135deg, rgba(0,212,255,0.08), rgba(0,212,255,0.02)); border:1px solid rgba(0,212,255,0.15); border-radius:12px;}
    .stat-label{font-size:11px; color:var(--text-3); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:6px;}
    .stat-value{font-size:20px; font-weight:700; color:var(--cyan);}
    .stat-detail{font-size:11px; color:var(--text-2); margin-top:4px;}
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <a class="sb-logo" href="{{ url_for('dashboard') }}">
        <div class="sb-logo-mark">M</div>
        <span class="sb-logo-text">MRDE</span>
      </a>

      <nav class="sb-nav">
        <div class="sb-section-label">Core</div>
        <a class="sb-item {{ 'active' if active_page == 'dashboard' else '' }}" href="{{ url_for('dashboard') }}">
          <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          <span>Dashboard</span>
        </a>
        <a class="sb-item {{ 'active' if active_page == 'regime' else '' }}" href="{{ url_for('app_page', page='regime') }}">
          <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          <span>Regime Explorer</span>
        </a>
        <a class="sb-item {{ 'active' if active_page == 'ml' else '' }}" href="{{ url_for('app_page', page='ml') }}">
          <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          <span>ML Insights</span>
        </a>
        <a class="sb-item {{ 'active' if active_page == 'reports' else '' }}" href="{{ url_for('app_page', page='reports') }}">
          <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <span>History & Reports</span>
        </a>

        <div class="sb-section-label">Account</div>
        <a class="sb-item {{ 'active' if active_page == 'profile' else '' }}" href="{{ url_for('app_page', page='profile') }}">
          <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="7" r="4"/><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/></svg>
          <span>Profile</span>
        </a>
        <a class="sb-item {{ 'active' if active_page == 'settings' else '' }}" href="{{ url_for('app_page', page='settings') }}">
          <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-1.41 1.41M4.93 4.93l1.41 1.41M4.93 19.07l1.41-1.41M19.07 19.07l-1.41-1.41M12 2v2M12 20v2M2 12h2M20 12h2"/></svg>
          <span>Settings</span>
        </a>
        <a class="sb-item {{ 'active' if active_page == 'docs' else '' }}" href="{{ url_for('app_page', page='docs') }}">
          <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <span>Documentation</span>
        </a>
      </nav>

      <div class="sb-bottom">
        <div class="sb-user">
          <div class="sb-avatar">{{ (user_name[:1] if user_name else "U")|upper }}</div>
          <div>
            <div class="sb-user-name">{{ user_name }}</div>
            <div class="sb-user-plan">{{ user_email }}</div>
          </div>
        </div>
      </div>
    </aside>

    <section class="main">
      <header class="topbar">
        <div>
          <div class="topbar-title">{{ page_title }}</div>
          <div class="topbar-sub">MARKET REGIME DETECTION ENGINE</div>
        </div>
        <div class="tb-actions">
          <a class="tb-btn" href="{{ url_for('dashboard') }}">Back to Dashboard</a>
          <form method="post" action="{{ url_for('logout') }}" style="margin:0;">
            <button class="tb-btn" type="submit">Logout</button>
          </form>
        </div>
      </header>

      <div class="content">
        {% block page_content %}{% endblock %}
      </div>
    </section>
  </div>
</body>
</html>
